ai:
  provider: openai
  model: gpt-4o
  temperature: 0.7
  max_tokens: 4096
  fallback_model: gpt-3.5-turbo

web3:
  network: ethereum
  rpc_url: ${WEB3_RPC_URL}
  chain_id: 1

server:
  host: 0.0.0.0
  port: 8000
  debug: false
  reload: false

orchestrator:
  sync_interval_minutes: 60
  research_interval_hours: 24
  content_interval_hours: 12
  ad_check_interval_hours: 6
  max_concurrent_agents: 5

quality:
  min_code_coverage: 0.80
  max_open_issues_warning: 20
  stale_days_threshold: 30

logging:
  level: INFO
  format: json
